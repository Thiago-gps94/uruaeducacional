<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site</title>
  <meta name="description" content="Meu primeiro site profissional">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <h1 class="logo">MeuSite</h1>

      <nav class="menu">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#sobre">Sobre</a></li>
          <li><a href="#contato">Contato</a></li>
        </ul>
      </nav>

      <button id="menu-toggle">☰</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h2>Bem-vindo ao meu site</h2>
      <p>Construído do zero com HTML, CSS e JavaScript</p>
      <button id="cta-btn">Clique aqui</button>
    </div>
  </section>

  <!-- SOBRE -->
  <section id="sobre" class="section">
    <div class="container">
      <h2>Meu primeiro site de verdade 🚀</h2>
      <p>Este é um exemplo de site base para começar seu projeto.</p>
    </div>
  </section>

  <!-- CONTATO -->
  <section id="contato" class="section">
    <div class="container">
      <h2>Contato</h2>
      <form id="form-contato">
        <input type="text" placeholder="Seu nome" required>
        <input type="email" placeholder="Seu email" required>
        <textarea placeholder="Sua mensagem"></textarea>
        <button type="submit">Enviar</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 - Meu Site</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
